<!DOCTYPE html>
<html>
<head>
    <title>Weather Based Crop Prediction</title>
</head>
<body>

    <h2>🌦 Weather Based Crop Prediction</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/predict_weather_crop">

        <label>Enter City Name:</label><br>
        <input type="text" name="city" required><br><br>

        <label>N Value:</label><br>
        <input type="number" name="n" required><br><br>

        <label>P Value:</label><br>
        <input type="number" name="p" required><br><br>

        <label>K Value:</label><br>
        <input type="number" name="k" required><br><br>

        <label>pH Value:</label><br>
        <input type="number" step="0.01" name="ph" required><br><br>

        <label>Rainfall (mm):</label><br>
        <input type="number" step="0.01" name="rain" required><br><br>

        <button type="submit">Predict Crop</button>

    </form>

</body>
</html>
